<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#292524"/>
  <!-- D20 dice shape -->
  <polygon points="32,6 54,22 48,52 16,52 10,22" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <polygon points="32,6 10,22 54,22" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="10" y1="22" x2="48" y2="52" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <line x1="54" y1="22" x2="16" y2="52" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
